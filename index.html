<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rhythm Battle — inspirado em FNF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game" role="application" aria-label="Rhythm Battle">
    <div id="topbar">
      <div class="health-wrap">
        <div class="label">Você</div>
        <div class="bar"><div id="playerFill" class="fill"></div></div>
      </div>

      <div id="phaseBox">
        <div id="dialogue" aria-live="polite"><span id="dialogueText">Clique para começar a aventura rítmica!</span></div>
      </div>

      <div class="health-wrap" style="justify-content:flex-end">
        <div class="label">Rival</div>
        <div class="bar"><div id="enemyFill" class="fill"></div></div>
      </div>
    </div>

    <div id="arena">
      <div id="bg" class="bg"></div>

      <div class="character player" id="playerChar">
        <div class="sprite" id="playerSprite">
          <div class="portrait" id="playerPortrait">YOU</div>
        </div>
        <div class="name" id="playerName">Vitor</div>
      </div>

      <div class="character enemy" id="enemyChar">
        <div class="sprite" id="enemySprite">
          <div class="portrait" id="enemyPortrait">RIVAL</div>
        </div>
        <div class="name" id="enemyName">Rival</div>
      </div>

      <div id="lane">
        <div id="targets" aria-hidden="true">
          <div class="target" data-key="s">S</div>
          <div class="target" data-key="d">D</div>
          <div class="target" data-key="k">K</div>
          <div class="target" data-key="l">L</div>
        </div>
      </div>

      <div id="feedback" role="status" aria-live="polite"></div>
    </div>

    <div id="footer">
      <div class="infoBox">Pontuação: <span id="score">0</span></div>
      <div class="infoBox">Combo: <span id="combo">0</span></div>
      <div class="infoBox">Fase: <span id="phase">1</span></div>
      <div class="infoBox">Teclas: S D K L</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
