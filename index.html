<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mini FNF Clone</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #game {
      margin: 50px auto;
      width: 400px;
      height: 400px;
      border: 2px solid #fff;
      position: relative;
      overflow: hidden;
    }
    .arrow {
      width: 80px;
      height: 80px;
      line-height: 80px;
      text-align: center;
      font-size: 40px;
      position: absolute;
      top: -100px;
      background: #333;
      border-radius: 10px;
    }
    .target {
      position: absolute;
      bottom: 20px;
      width: 80px;
      height: 80px;
      line-height: 80px;
      text-align: center;
      font-size: 40px;
      background: #555;
      border-radius: 10px;
    }
    #score {
      margin-top: 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <h1>Mini Friday Night Funkin</h1>
  <div id="game">
    <div class="target" style="left:20px">S</div>
    <div class="target" style="left:120px">D</div>
    <div class="target" style="left:220px">K</div>
    <div class="target" style="left:320px">L</div>
  </div>
  <div id="score">Pontuação: 0</div>

  <script>
    const game = document.getElementById("game");
    const scoreDisplay = document.getElementById("score");
    let score = 0;

    const keys = { "s":20, "d":120, "k":220, "l":320 };

    function createArrow() {
      const letters = ["s","d","k","l"];
      const letter = letters[Math.floor(Math.random()*letters.length)];
      const arrow = document.createElement("div");
      arrow.classList.add("arrow");
      arrow.style.left = keys[letter] + "px";
      arrow.textContent = letter.toUpperCase();
      game.appendChild(arrow);

      let pos = -100;
      const interval = setInterval(() => {
        pos += 5;
        arrow.style.top = pos + "px";

        if(pos > 400) {
          game.removeChild(arrow);
          clearInterval(interval);
        }
      }, 50);
    }

    setInterval(createArrow, 1500);

    document.addEventListener("keydown", e => {
      const key = e.key.toLowerCase();
      if(keys[key] !== undefined) {
        const arrows = document.querySelectorAll(".arrow");
        arrows.forEach(arrow => {
          const arrowTop = parseInt(arrow.style.top);
          const arrowLeft = parseInt(arrow.style.left);
          if(arrowLeft === keys[key] && arrowTop > 280 && arrowTop < 380) {
            score += 10;
            scoreDisplay.textContent = "Pontuação: " + score;
            game.removeChild(arrow);
          }
        });
      }
    });
  </script>
</body>
</html>
