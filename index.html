<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo com Personagem Detalhado</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: linear-gradient(#4facfe 0%, #00f2fe 100%); border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 400;

const player = {
    x: 100,
    y: 200,
    width: 30,
    height: 60,
    dy: 0,
    jumpForce: 12,
    gravity: 0.6,
    speed: 5,
    grounded: false,
    direction: 1, // 1 para direita, -1 para esquerda
    walkCycle: 0  // Para animar os braços/pernas
};

const ground = { y: 350, height: 50 };
const keys = {};

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function drawPlayer(p) {
    ctx.save();
    ctx.translate(p.x + p.width/2, p.y + p.height/2);
    
    // Inverte o desenho se estiver olhando para a esquerda
    if (p.direction === -1) ctx.scale(-1, 1);

    const t = p.walkCycle;
    const breathe = Math.sin(Date.now() / 200) * 2; // Efeito de respiração

    // 1. Pernas / Calça (Azul)
    ctx.fillStyle = "#2c3e50";
    ctx.fillRect(-10, 10, 8, 20); // Perna esquerda
    ctx.fillRect(2, 10, 8, 20);  // Perna direita

    // 2. Sapatos
    ctx.fillStyle = "#333";
    ctx.fillRect(-11, 28, 10, 5);
    ctx.fillRect(1, 28, 10, 5);

    // 3. Corpo / Camisa (Verde)
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(-12, -15 + breathe, 24, 25); 

    // 4. Braços
    ctx.fillStyle = "#e0ac69"; // Cor da pele
    let armSwing = Math.sin(t) * 10;
    ctx.fillRect(-15, -12 + breathe, 6, 15); // Braço atrás
    ctx.fillRect(9, -12 + breathe, 6, 15);  // Braço frente

    // 5. Cabeça
    ctx.fillStyle = "#e0ac69";
    ctx.fillRect(-8, -32 + breathe, 16, 18);

    // 6. Cabelo
    ctx.fillStyle = "#4e342e";
    ctx.fillRect(-9, -34 + breathe, 18, 7);

    // 7. Olho
    ctx.fillStyle = "white";
    ctx.fillRect(2, -28 + breathe, 5, 5);
    ctx.fillStyle = "black";
    ctx.fillRect(5, -27 + breathe, 2, 2);

    ctx.restore();
}

function update() {
    let moving = false;

    if (keys["ArrowRight"]) {
        player.x += player.speed;
        player.direction = 1;
        moving = true;
    }
    if (keys["ArrowLeft"]) {
        player.x -= player.speed;
        player.direction = -1;
        moving = true;
    }

    if (moving) {
        player.walkCycle += 0.2;
    } else {
        player.walkCycle = 0;
    }

    if (keys["Space"] && player.grounded) {
        player.dy = -player.jumpForce;
        player.grounded = false;
    }

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y + player.height > ground.y) {
        player.y = ground.y - player.height;
        player.dy = 0;
        player.grounded = true;
    }

    // Limites
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Chão (com grama)
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(0, ground.y, canvas.width, ground.height);
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(0, ground.y, canvas.width, 5); // Linha da grama

    drawPlayer(player);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
