<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stimulation Clicker — Collage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="scene">
    <!-- chaotic collage background elements -->
    <div class="dvd dvd-1">DVD</div>
    <div class="dvd dvd-2">DVD</div>
    <div class="dvd dvd-3">DVD</div>
    <div class="dvd dvd-4">DVD</div>

    <div class="photo photo-sandwich">🥪</div>
    <div class="photo photo-runner">🏃‍♂️</div>
    <div class="photo photo-mic">🎤</div>
    <div class="eggs">🥚🥚🥚</div>

    <div class="notif">Cloud — Seu armazenamento está 100% cheio</div>

    <div class="top-row">
      <div class="bitcoin">
        <div class="btc-label">BTC</div>
        <canvas id="btcChart" width="220" height="60"></canvas>
        <div class="btc-value">$51,871</div>
      </div>

      <div class="quiz">
        <div class="q-title">Which word rhymes with "trough"?</div>
        <div class="q-opts">
          <button class="opt">Through</button>
          <button class="opt">Rough</button>
          <button class="opt">Cough</button>
          <button class="opt">Ugh</button>
        </div>
      </div>
    </div>

    <!-- central game UI -->
    <main id="game">
      <div class="game-card">
        <div class="level">Level <span id="level">30</span></div>

        <div class="stacks">
          <div class="stack left">
            <div class="big-num" id="total">171.500</div>
            <div class="muted">stimulation</div>
            <div class="collect">Collect <span id="collect">+314,500</span></div>
          </div>

          <div class="center-click">
            <div class="small-num" id="bank">1.243.269</div>
            <button id="clicker" class="clicker">Click me</button>
            <div class="per-sec" id="perSec">4,918 /s</div>
          </div>

          <div class="stack right">
            <div class="btn-row">
              <button class="menu">Screen Time</button>
              <button class="menu">Item Shop</button>
            </div>
            <div class="btn-row">
              <button class="menu">Achievements</button>
              <button class="menu">Inbox</button>
            </div>
          </div>
        </div>

        <div class="progress-row">
          <div class="progress-bar">
            <i id="progressFill"></i>
          </div>
          <div class="progress-text" id="progressText">Progress 42%</div>
        </div>
      </div>
    </main>

    <!-- decorative bottom clutter -->
    <div class="bottom-clutter">
      <div class="ticker">NEWS • MEMES • ADS • NOTIFICATIONS • ADS • MEMES</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
