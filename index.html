<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Combo Clicker — Mais power quanto mais você clica</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>

  <div class="container">
    <header>
      <h1>Combo Clicker</h1>
      <div class="subtitle">Clique rápido para aumentar seu poder</div>
    </header>

    <main class="game">
      <section class="panel center">
        <div class="meter">
          <div class="meter-value" id="comboMeter"></div>
        </div>

        <button id="clicker" class="big-btn" aria-label="Clique">
          <span id="ripple-layer"></span>
          <div class="count" id="count">0</div>
          <div class="sub" id="perClick">+1</div>
          <div class="combo" id="comboText">Combo x1</div>
        </button>

        <div class="stats">
          <div><strong id="perSec">0</strong><div class="muted">/s</div></div>
          <div><strong id="bestCombo">x1</strong><div class="muted">melhor combo</div></div>
          <div><strong id="totalClicks">0</strong><div class="muted">cliques</div></div>
        </div>

        <div class="controls">
          <button id="save" class="small">Salvar</button>
          <button id="load" class="small">Carregar</button>
          <button id="reset" class="small">Resetar</button>
        </div>
      </section>

      <aside class="panel right">
        <h3>Upgrades</h3>
        <div id="upgrades" class="upgrades"></div>

        <h3>Histórico</h3>
        <div id="log" class="log"></div>
      </aside>
    </main>

    <footer>
      <div class="progress-row">
        <div class="progress" title="Progresso geral">
          <i id="progressFill"></i>
        </div>
        <div class="progress-label" id="progressLabel">0%</div>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
