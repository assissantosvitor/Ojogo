<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCraft 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div class="game-container">
        <canvas id="canvas"></canvas>
        
        <div class="ui-overlay">
            <!-- Canto superior direito -->
            <div class="top-right">
                <div class="title-bar">MINICRAFT</div>
                <div class="inventory">
                    ITENS: <span id="item-count">0</span>
                </div>
            </div>

            <!-- Crosshair -->
            <div class="crosshair">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="13" y="0" width="4" height="30" fill="#fff"/>
                    <rect x="0" y="13" width="30" height="4" fill="#fff"/>
                    <rect x="14" y="14" width="2" height="2" fill="#000"/>
                </svg>
            </div>

            <!-- Hotbar -->
            <div class="hotbar" id="hotbar"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
