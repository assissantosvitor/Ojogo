<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Clicker Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="stats">
            <h2>Estimulação</h2>
            <div class="score" id="score">0</div>
        </div>

        <button class="main-btn" id="clickBtn">
            CLIQUE ME!
        </button>

        <div class="upgrades">
            <h3>Loja de Upgrades</h3>
            <button class="upgrade-btn" id="upgrade1">
                Melhorar Clique (+1 por clique)
                <br>
                <span class="cost">Custo: <span id="upgrade1-cost">10</span></span>
            </button>
            <button class="upgrade-btn" id="upgrade2">
                Auto-Clicker (+1 por segundo)
                <br>
                <span class="cost">Custo: <span id="upgrade2-cost">50</span></span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
