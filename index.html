<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini FNF Battle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <div id="hud">
      <div class="health left">
        <div class="label">Você</div>
        <div class="bar"><div class="fill" id="playerHealth"></div></div>
      </div>
      <div class="health right">
        <div class="label">Rival</div>
        <div class="bar"><div class="fill" id="enemyHealth"></div></div>
      </div>
    </div>

    <div id="battle-area">
      <div id="background"></div>

      <div class="character player" id="player">
        <div class="sprite idle" id="playerSprite">YOU</div>
      </div>

      <div class="character enemy" id="enemy">
        <div class="sprite idle" id="enemySprite">RIVAL</div>
      </div>

      <div id="targets">
        <div class="target" data-key="s">S</div>
        <div class="target" data-key="d">D</div>
        <div class="target" data-key="k">K</div>
        <div class="target" data-key="l">L</div>
      </div>

      <div id="arrow-lane"></div>
    </div>

    <div id="info">
      <div id="score">Pontuação: <span id="scoreVal">0</span></div>
      <div id="combo">Combo: <span id="comboVal">0</span></div>
    </div>

    <audio id="music" src="song.mp3" preload="auto"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
