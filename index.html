<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Ojogo - Battle Rhythm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <div id="dialogue-box">
      <p id="dialogue-text">Clique para começar a batalha!</p>
    </div>

    <div id="hud">
      <div class="health"><div class="fill" id="playerHealth"></div></div>
      <div class="health"><div class="fill" id="enemyHealth"></div></div>
    </div>

    <div id="battle-area">
      <div class="character player" id="player">
        <div class="sprite">Herói</div>
      </div>
      <div class="character enemy" id="enemy">
        <div class="sprite">Rival</div>
      </div>

      <div id="targets">
        <div class="target" data-key="s">S</div>
        <div class="target" data-key="d">D</div>
        <div class="target" data-key="k">K</div>
        <div class="target" data-key="l">L</div>
      </div>
      <div id="arrow-lane"></div>
    </div>

    <div id="info">
      <div id="score">Pontuação: <span id="scoreVal">0</span></div>
      <div id="combo">Combo: <span id="comboVal">0</span></div>
      <div id="phase">Fase: <span id="phaseVal">1</span></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
